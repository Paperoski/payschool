<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contabilidad | PaySchool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="min-h-screen flex">
    <aside class="w-72 bg-slate-900 text-white flex flex-col hidden md:flex shadow-2xl z-20">
        <div class="p-8 text-3xl font-bold border-b border-slate-800 text-sky-400"><i class="fa-solid fa-graduation-cap mr-3"></i>PaySchool</div>
        <nav class="flex-1 p-5 space-y-3 mt-4">
            <a href="/dashboard.html" class="sidebar-item flex items-center p-4 rounded-xl font-medium text-slate-300"><i class="fa-solid fa-chart-pie w-6 mr-3"></i> Resumen</a>
            <a href="/employees.html" class="sidebar-item flex items-center p-4 rounded-xl font-medium text-slate-300"><i class="fa-solid fa-users w-6 mr-3"></i> Personal</a>
            <a href="/payroll.html" class="sidebar-item flex items-center p-4 rounded-xl font-medium text-slate-300"><i class="fa-solid fa-file-invoice-dollar w-6 mr-3"></i> Nómina</a>
            <a href="/accounting.html" class="sidebar-item active-nav flex items-center p-4 rounded-xl font-semibold text-white"><i class="fa-solid fa-book w-6 mr-3"></i> Contabilidad</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-white shadow-sm p-6 flex justify-between items-center z-10">
            <h1 class="text-2xl font-bold text-slate-800">Libro Diario</h1>
            <button onclick="abrirModalAsiento()" class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 px-6 rounded-lg shadow-md transition"><i class="fa-solid fa-plus mr-2"></i> Nuevo Asiento</button>
        </header>

        <div class="p-8 flex-1 overflow-y-auto">
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left">
                    <thead><tr><th class="p-4">Fecha</th><th class="p-4">Comprobante</th><th class="p-4 text-right">Débito</th><th class="p-4 text-right">Crédito</th></tr></thead>
                    <tbody id="tablaAsientos" class="divide-y divide-slate-100">
                        <tr><td colspan="4" class="p-8 text-center text-slate-500">El libro diario está vacío. Registra un asiento.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalAsiento" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-2xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Registrar Asiento</h2>
                <button onclick="cerrarModalAsiento()" class="text-slate-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="formAsiento">
                <input type="text" id="asientoDesc" placeholder="Descripción (Ej: Pago matrícula)" required class="w-full p-3 mb-4 border rounded-lg">
                <input type="number" id="asientoMonto" placeholder="Monto total ($)" required class="w-full p-3 border rounded-lg">
                <button type="submit" class="w-full mt-6 bg-sky-500 text-white font-bold py-3 rounded-xl">Guardar Asiento</button>
            </form>
        </div>
    </div>

    <script>
        function abrirModalAsiento() { document.getElementById('modalAsiento').classList.add('modal-active'); document.getElementById('modalAsiento').classList.remove('hidden'); }
        function cerrarModalAsiento() { document.getElementById('modalAsiento').classList.remove('modal-active'); document.getElementById('modalAsiento').classList.add('hidden'); document.getElementById('formAsiento').reset(); }

        document.getElementById('formAsiento').addEventListener('submit', (e) => {
            e.preventDefault();
            const desc = document.getElementById('asientoDesc').value;
            const monto = Number(document.getElementById('asientoMonto').value);
            const fecha = new Date().toLocaleDateString();

            const tbody = document.getElementById('tablaAsientos');
            if(tbody.innerHTML.includes('vacío')) tbody.innerHTML = ''; // Limpiar mensaje de vacío

            // Agrega la partida doble visualmente
            tbody.innerHTML += `
                <tr class="hover:bg-slate-50"><td class="p-4">${fecha}</td><td class="p-4 font-bold">${desc}</td><td class="p-4 text-right text-emerald-600">$${monto.toLocaleString()}</td><td class="p-4 text-right text-slate-400">$0</td></tr>
                <tr class="hover:bg-slate-50"><td class="p-4">${fecha}</td><td class="p-4 text-slate-500">Contrapartida</td><td class="p-4 text-right text-slate-400">$0</td><td class="p-4 text-right text-rose-500">$${monto.toLocaleString()}</td></tr>
            `;
            cerrarModalAsiento();
        });
    </script>
</body>
</html>
