<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | PaySchool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="min-h-screen flex">

    <aside class="w-72 bg-slate-900 text-white flex flex-col hidden md:flex shadow-2xl z-20">
        <div class="p-8 text-3xl font-bold border-b border-slate-800 text-sky-400">
            <i class="fa-solid fa-graduation-cap mr-3"></i>PaySchool
        </div>
        <nav class="flex-1 p-5 space-y-3 mt-4">
            <a href="/dashboard.html" class="sidebar-item active-nav flex items-center p-4 rounded-xl font-semibold text-white"><i class="fa-solid fa-chart-pie w-6 mr-3"></i> Resumen</a>
            <a href="/employees.html" class="sidebar-item flex items-center p-4 rounded-xl font-medium text-slate-300"><i class="fa-solid fa-users w-6 mr-3"></i> Personal</a>
            <a href="/payroll.html" class="sidebar-item flex items-center p-4 rounded-xl font-medium text-slate-300"><i class="fa-solid fa-file-invoice-dollar w-6 mr-3"></i> Nómina</a>
            <a href="/accounting.html" class="sidebar-item flex items-center p-4 rounded-xl font-medium text-slate-300"><i class="fa-solid fa-book w-6 mr-3"></i> Contabilidad</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-white shadow-sm p-6 flex justify-between items-center z-10">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Panel Financiero</h1>
            </div>
            <button onclick="abrirModalSaldos()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded-lg shadow-md transition flex items-center">
                <i class="fa-solid fa-pen-to-square mr-2"></i> Ajustar Saldos
            </button>
        </header>

        <div class="p-8 flex-1 overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="glass-card p-6 flex items-center">
                    <div class="w-14 h-14 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-2xl mr-5"><i class="fa-solid fa-arrow-trend-up"></i></div>
                    <div>
                        <h3 class="text-slate-500 font-medium text-sm mb-1">Ingresos Registrados</h3>
                        <p class="text-3xl font-bold text-slate-800" id="txtIngresos">$0</p>
                    </div>
                </div>
                <div class="glass-card p-6 flex items-center">
                    <div class="w-14 h-14 rounded-full bg-rose-100 text-rose-600 flex items-center justify-center text-2xl mr-5"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                    <div>
                        <h3 class="text-slate-500 font-medium text-sm mb-1">Gastos de Nómina</h3>
                        <p class="text-3xl font-bold text-slate-800" id="txtGastos">$0</p>
                    </div>
                </div>
            </div>

            <div class="glass-card p-8 w-full">
                <h2 class="text-xl font-bold text-slate-800 mb-6">Balance Actual</h2>
                <div class="relative h-[300px] w-full"><canvas id="graficaColegio"></canvas></div>
            </div>
        </div>
    </main>

    <div id="modalSaldos" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800">Actualizar Saldos</h2>
                <button onclick="cerrarModalSaldos()" class="text-slate-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Ingresos Totales ($)</label>
                    <input type="number" id="inputIngresos" class="w-full p-3 border border-slate-300 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Gastos Totales ($)</label>
                    <input type="number" id="inputGastos" class="w-full p-3 border border-slate-300 rounded-lg outline-none">
                </div>
            </div>
            <button onclick="guardarSaldos()" class="w-full mt-6 bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 rounded-xl">Guardar</button>
        </div>
    </div>

    <script>
        let myChart;
        function cargarDatos() {
            const ingresos = localStorage.getItem('ingresos') || 0;
            const gastos = localStorage.getItem('gastos') || 0;
            
            document.getElementById('txtIngresos').innerText = '$' + Number(ingresos).toLocaleString();
            document.getElementById('txtGastos').innerText = '$' + Number(gastos).toLocaleString();
            
            actualizarGrafica(ingresos, gastos);
        }

        function actualizarGrafica(ingresos, gastos) {
            const ctx = document.getElementById('graficaColegio').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Mes Actual'],
                    datasets: [
                        { label: 'Ingresos', data: [ingresos], backgroundColor: '#0ea5e9' },
                        { label: 'Gastos', data: [gastos], backgroundColor: '#f43f5e' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function abrirModalSaldos() { 
            document.getElementById('inputIngresos').value = localStorage.getItem('ingresos') || 0;
            document.getElementById('inputGastos').value = localStorage.getItem('gastos') || 0;
            document.getElementById('modalSaldos').classList.add('modal-active'); 
            document.getElementById('modalSaldos').classList.remove('hidden');
        }
        function cerrarModalSaldos() { 
            document.getElementById('modalSaldos').classList.remove('modal-active'); 
            document.getElementById('modalSaldos').classList.add('hidden');
        }
        function guardarSaldos() {
            localStorage.setItem('ingresos', document.getElementById('inputIngresos').value);
            localStorage.setItem('gastos', document.getElementById('inputGastos').value);
            cargarDatos();
            cerrarModalSaldos();
        }

        cargarDatos();
    </script>
</body>
</html>
