<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Empleados | PaySchool</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">🎓 PaySchool ERP</div>
    <nav class="nav">
      <a href="/dashboard.html">Dashboard</a>
      <a class="active" href="/employees.html">Empleados</a>
      <a href="/payroll.html">Nómina</a>
      <a href="/accounting.html">Contabilidad</a>
      <a href="/users.html">Usuarios</a>
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <div>
        <h1 class="title">Gestión de Empleados</h1>
        <p class="subtitle">Alta, mantenimiento y estado del personal institucional.</p>
      </div>
    </header>

    <section class="card" style="margin-bottom: 16px;">
      <h3>Registrar empleado</h3>
      <div class="form-grid">
        <input id="nombre" class="input" placeholder="Nombre" />
        <input id="apellido" class="input" placeholder="Apellido" />
        <input id="cedula" class="input" placeholder="Cédula" />
        <input id="cargo" class="input" placeholder="Cargo" />
        <input id="salario_base" type="number" class="input" placeholder="Salario base" />
        <button class="btn" onclick="createEmployee()">Crear</button>
      </div>
    </section>

    <section class="card table-wrap">
      <h3>Empleados registrados</h3>
      <table>
        <thead>
          <tr><th>ID</th><th>Nombre</th><th>Cédula</th><th>Cargo</th><th>Salario</th><th>Estado</th></tr>
        </thead>
        <tbody id="employees-table"></tbody>
      </table>
    </section>
  </main>
</div>

<script>
  async function loadEmployees() {
    const response = await fetch('/api/employees');
    const result = await response.json();
    const rows = result.data || [];

    document.getElementById('employees-table').innerHTML = rows.length
      ? rows.map(e => `
          <tr>
            <td>${e.id}</td>
            <td>${e.nombre} ${e.apellido || ''}</td>
            <td>${e.cedula}</td>
            <td>${e.cargo}</td>
            <td>$${Number(e.salario_base).toLocaleString('es-CO')}</td>
            <td>${e.activo === false ? '<span class="pill alert">Inactivo</span>' : '<span class="pill ok">Activo</span>'}</td>
          </tr>
        `).join('')
      : '<tr><td colspan="6">No hay empleados.</td></tr>';
  }

  async function createEmployee() {
    const body = {
      nombre: document.getElementById('nombre').value.trim(),
      apellido: document.getElementById('apellido').value.trim(),
      cedula: document.getElementById('cedula').value.trim(),
      cargo: document.getElementById('cargo').value.trim(),
      salario_base: Number(document.getElementById('salario_base').value)
    };

    const response = await fetch('/api/employees', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const result = await response.json();

    if (!result.success) return alert(result.message || 'No se pudo crear el empleado.');

    ['nombre', 'apellido', 'cedula', 'cargo', 'salario_base'].forEach((id) => {
      document.getElementById(id).value = '';
    });
    loadEmployees();
  }

  loadEmployees();
</script>
</body>
</html>
