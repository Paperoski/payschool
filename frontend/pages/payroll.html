<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Nómina | PaySchool</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">🎓 PaySchool ERP</div>
    <nav class="nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/employees.html">Empleados</a>
      <a class="active" href="/payroll.html">Nómina</a>
      <a href="/accounting.html">Contabilidad</a>
      <a href="/users.html">Usuarios</a>
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <div>
        <h1 class="title">Motor de Nómina</h1>
        <p class="subtitle">Cálculo, simulación y trazabilidad de periodos de pago.</p>
      </div>
    </header>

    <section class="card" style="margin-bottom:16px;">
      <h3>Generar nómina</h3>
      <div class="form-grid">
        <input id="periodo" class="input" placeholder="Periodo (Ej. Mensual)" />
        <input id="mes" class="input" placeholder="Mes" />
        <input id="anio" type="number" class="input" placeholder="Año" />
        <select id="guardar">
          <option value="true">Guardar en historial</option>
          <option value="false">Solo simular</option>
        </select>
        <button class="btn" onclick="calculatePayroll()">Procesar nómina</button>
      </div>
    </section>

    <section class="card table-wrap">
      <h3>Historial de nómina</h3>
      <table>
        <thead>
          <tr><th>ID</th><th>Periodo</th><th>Fecha</th><th>Empleados</th><th>Neto total</th></tr>
        </thead>
        <tbody id="payroll-table"></tbody>
      </table>
    </section>
  </main>
</div>

<script>
  async function loadPayroll() {
    const response = await fetch('/api/payroll/historial');
    const result = await response.json();

    document.getElementById('payroll-table').innerHTML = (result.data || []).length
      ? result.data.map((payroll) => {
          const neto = (payroll.detalles || []).reduce((acc, item) => acc + (item.netoPagar || 0), 0);
          return `
            <tr>
              <td>${payroll.id}</td>
              <td>${payroll.periodo} - ${payroll.mes} ${payroll.anio}</td>
              <td>${new Date(payroll.fecha_generacion).toLocaleString('es-CO')}</td>
              <td>${(payroll.detalles || []).length}</td>
              <td>$${Math.round(neto).toLocaleString('es-CO')}</td>
            </tr>
          `;
        }).join('')
      : '<tr><td colspan="5">Sin nóminas generadas.</td></tr>';
  }

  async function calculatePayroll() {
    const body = {
      periodo: document.getElementById('periodo').value.trim() || 'Mensual',
      mes: document.getElementById('mes').value.trim() || 'Actual',
      anio: Number(document.getElementById('anio').value) || new Date().getFullYear(),
      guardar: document.getElementById('guardar').value === 'true'
    };

    const response = await fetch('/api/payroll/calcular', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const result = await response.json();

    if (!result.success) return alert(result.message || 'No fue posible procesar la nómina.');
    alert(result.message);
    loadPayroll();
  }

  loadPayroll();
</script>
</body>
</html>
