<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administración de Usuarios | PaySchool</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">🎓 PaySchool ERP</div>
    <nav class="nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/employees.html">Empleados</a>
      <a href="/payroll.html">Nómina</a>
      <a href="/accounting.html">Contabilidad</a>
      <a class="active" href="/users.html">Usuarios</a>
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <div>
        <h1 class="title">Usuarios y control de acceso</h1>
        <p class="subtitle">Gestión de cuentas internas para operación empresarial.</p>
      </div>
    </header>

    <section class="card" style="margin-bottom:16px;">
      <h3>Crear usuario</h3>
      <div class="form-grid">
        <input id="nombre" class="input" placeholder="Nombre completo" />
        <input id="email" class="input" type="email" placeholder="Correo" />
        <input id="password" class="input" type="password" placeholder="Contraseña" />
        <select id="rol">
          <option value="superadmin">Superadmin</option>
          <option value="admin">Admin</option>
          <option value="contador">Contador</option>
          <option value="rectoria">Rectoría</option>
        </select>
        <button class="btn" onclick="createUser()">Crear usuario</button>
      </div>
    </section>

    <section class="card table-wrap">
      <h3>Usuarios del sistema</h3>
      <table>
        <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th>Creación</th></tr></thead>
        <tbody id="users-body"></tbody>
      </table>
    </section>
  </main>
</div>

<script>
  async function loadUsers() {
    const response = await fetch('/api/users');
    const result = await response.json();
    const users = result.data || [];

    document.getElementById('users-body').innerHTML = users.length
      ? users.map((user) => `
        <tr>
          <td>${user.id}</td>
          <td>${user.nombre}</td>
          <td>${user.email}</td>
          <td>${user.rol}</td>
          <td>${user.activo === false ? '<span class="pill alert">Inactivo</span>' : '<span class="pill ok">Activo</span>'}</td>
          <td>${new Date(user.fecha_creacion).toLocaleDateString('es-CO')}</td>
        </tr>
      `).join('')
      : '<tr><td colspan="6">No hay usuarios registrados.</td></tr>';
  }

  async function createUser() {
    const body = {
      nombre: document.getElementById('nombre').value.trim(),
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
      rol: document.getElementById('rol').value
    };

    const response = await fetch('/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const result = await response.json();
    if (!result.success) return alert(result.message || 'Error creando usuario.');

    ['nombre', 'email', 'password'].forEach((id) => { document.getElementById(id).value = ''; });
    loadUsers();
  }

  loadUsers();
</script>
</body>
</html>
